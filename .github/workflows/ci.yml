name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint + types + doctests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check django_bikram_sambat/
      - name: Mypy (strict)
        run: mypy django_bikram_sambat/
      - name: Doctests
        run: >
          pytest --doctest-modules
          django_bikram_sambat/date.py django_bikram_sambat/convert.py
          django_bikram_sambat/formatting.py django_bikram_sambat/exceptions.py
          django_bikram_sambat/calendar_data.py django_bikram_sambat/predict.py
          django_bikram_sambat/sources.py django_bikram_sambat/fiscal.py -q

  test:
    name: py${{ matrix.python-version }} · Django ${{ matrix.django }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        django: ["4.2", "5.2", "6.0"]
        exclude:
          # Django 4.2 supports Python up to 3.12.
          - python-version: "3.13"
            django: "4.2"
          # Django 6.0 requires Python 3.12+.
          - python-version: "3.10"
            django: "6.0"
          - python-version: "3.11"
            django: "6.0"
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install --upgrade pip
      - run: pip install -e ".[dev]"
      - name: Pin Django ${{ matrix.django }}
        run: pip install "Django~=${{ matrix.django }}.0"
      - name: Show versions
        run: python -c "import django, rest_framework, sys; print(sys.version); print('Django', django.__version__, 'DRF', rest_framework.VERSION)"
      - name: Test
        run: pytest -q

  build:
    name: build + metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97 # v7.0.0
        with:
          python-version: "3.12"
      - run: pip install build twine
      - run: python -m build
      - name: Validate metadata (README renders on PyPI, etc.)
        run: twine check --strict dist/*
